<!doctype html>
<html>
  <head>
    <title>Sanity API Test</title>
  </head>
  <body>
    <h1>Sanity API Test</h1>
    <div id="result"></div>

    <script>
      async function testSanityAPI() {
        const query = `*[_type == "article"] | order(publishedAt desc) {
                _id,
                title,
                slug,
                excerpt,
                "image": mainImage.asset->url,
                publishedAt,
                "author": author->name,
                "category": category->title,
                readTime,
                featured
            }`;

        const url = `https://f37vktt0.api.sanity.io/v2024-01-01/data/query/production?query=${encodeURIComponent(query)}`;

        try {
          const response = await fetch(url);
          const data = await response.json();
          document.getElementById("result").innerHTML = `
                    <h2>Success!</h2>
                    <p>Found ${data.result.length} articles</p>
                    <pre>${JSON.stringify(data.result, null, 2)}</pre>
                `;
        } catch (error) {
          document.getElementById("result").innerHTML = `
                    <h2>Error</h2>
                    <p>${error.message}</p>
                `;
        }
      }

      testSanityAPI();
    </script>
  </body>
</html>
